<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinFlow | Login</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg-main, #f1f5ff);
      color: var(--text-main, #10182b);
      font-family: "Inter", sans-serif;
      padding: 20px;
    }
    .auth-box {
      width: min(420px, 100%);
      background: var(--surface, #fff);
      border: 1px solid var(--line, #e1e8f5);
      border-radius: 16px;
      box-shadow: var(--shadow-card, 0 18px 40px rgba(20,33,60,.09));
      padding: 24px;
    }
    .auth-title {
      margin: 0;
      font-size: 1.35rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--text-primary, #10182b);
    }
    .auth-subtitle {
      margin: 6px 0 16px;
      color: var(--text-muted, #667796);
      font-size: .92rem;
    }
    .brand-lockup {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .brand-badge {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      color: #fff;
      background: linear-gradient(135deg, #4f7eff, #7f7cff);
      box-shadow: 0 10px 22px rgba(79, 126, 255, 0.25);
      flex: 0 0 auto;
    }
    .brand-copy {
      text-align: center;
    }
    .form-label {
      font-size: .9rem;
      font-weight: 600;
      margin-bottom: 6px;
      display: inline-block;
    }
    .form-control {
      width: 100%;
      min-height: 44px;
      border-radius: 12px;
      border: 1px solid var(--line, #e1e8f5);
      padding: 0 12px;
      box-sizing: border-box;
      font: inherit;
      background: var(--surface-soft, #f8fbff);
      color: inherit;
    }
    .form-control:focus {
      outline: none;
      border-color: var(--primary, #3f6ef6);
      box-shadow: 0 0 0 4px rgba(63, 110, 246, 0.15);
    }
    .auth-btn {
      width: 100%;
      border: 0;
      min-height: 46px;
      border-radius: 12px;
      font-weight: 700;
      color: #fff;
      margin-top: 18px;
      background: linear-gradient(130deg, var(--primary, #3f6ef6), var(--primary-2, #705eff));
      cursor: pointer;
    }
    .auth-meta {
      margin: 12px 0 0;
      color: var(--text-muted, #667796);
      font-size: .9rem;
    }
    .auth-meta a {
      color: var(--primary, #3f6ef6);
      text-decoration: none;
      font-weight: 700;
    }
    .auth-msg {
      min-height: 20px;
      font-size: .88rem;
      margin-top: 10px;
    }
    .auth-msg.error { color: #d94e63; }
    .auth-msg.success { color: #0f9a75; }
    .auth-hint {
      margin: 10px 0 0;
      font-size: .82rem;
      color: var(--text-muted, #667796);
    }
    .auth-page {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .brand-top {
      width: min(420px, 100%);
      display: flex;
      justify-content: center;
    }
  </style>
</head>
<body data-page="login">
  <main class="auth-page">
    <div class="brand-top">
      <div class="brand-lockup" aria-label="FinFlow brand">
        <div class="brand-badge" aria-hidden="true">FF</div>
        <div class="brand-copy">
          <h2 class="auth-title">FinFlow</h2>
          <p class="auth-subtitle">Sign in to access your dashboard</p>
        </div>
      </div>
    </div>

    <section class="auth-box">
      <form id="loginForm" novalidate>
        <label for="loginEmail" class="form-label">Email</label>
        <input id="loginEmail" class="form-control" type="email" placeholder="you@example.com" required />

        <label for="loginPassword" class="form-label" style="margin-top:12px;">Password</label>
        <input id="loginPassword" class="form-control" type="password" placeholder="Enter password" required />

        <button type="submit" class="auth-btn">Login</button>
        <p class="auth-hint">Demo: demo@finflow.com / Demo@123</p>
        <p id="loginMessage" class="auth-msg"></p>
      </form>

      <p class="auth-meta">No account? <a href="signup.html">Create one</a></p>
    </section>
  </main>

  <script src="auth.js"></script>
</body>
</html>
