<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinFlow | Sign Up</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg-main, #f1f5ff);
      color: var(--text-main, #10182b);
      font-family: "Inter", sans-serif;
      padding: 20px;
    }
    .auth-box {
      width: min(440px, 100%);
      background: var(--surface, #fff);
      border: 1px solid var(--line, #e1e8f5);
      border-radius: 16px;
      box-shadow: var(--shadow-card, 0 18px 40px rgba(20,33,60,.09));
      padding: 24px;
    }
    .auth-title {
      margin: 0;
      font-size: 1.4rem;
      font-weight: 800;
    }
    .auth-subtitle {
      margin: 6px 0 18px;
      color: var(--text-muted, #667796);
      font-size: .92rem;
    }
    .form-label {
      font-size: .9rem;
      font-weight: 600;
      margin-bottom: 6px;
      display: inline-block;
    }
    .form-control {
      width: 100%;
      min-height: 44px;
      border-radius: 12px;
      border: 1px solid var(--line, #e1e8f5);
      padding: 0 12px;
      box-sizing: border-box;
      font: inherit;
      background: var(--surface-soft, #f8fbff);
      color: inherit;
    }
    .form-control:focus {
      outline: none;
      border-color: var(--primary, #3f6ef6);
      box-shadow: 0 0 0 4px rgba(63, 110, 246, 0.15);
    }
    .auth-btn {
      width: 100%;
      border: 0;
      min-height: 46px;
      border-radius: 12px;
      font-weight: 700;
      color: #fff;
      margin-top: 18px;
      background: linear-gradient(130deg, var(--primary, #3f6ef6), var(--primary-2, #705eff));
      cursor: pointer;
    }
    .auth-meta {
      margin: 12px 0 0;
      color: var(--text-muted, #667796);
      font-size: .9rem;
    }
    .auth-meta a {
      color: var(--primary, #3f6ef6);
      text-decoration: none;
      font-weight: 700;
    }
    .auth-msg {
      min-height: 20px;
      font-size: .88rem;
      margin-top: 10px;
    }
    .auth-msg.error { color: #d94e63; }
    .auth-msg.success { color: #0f9a75; }
  </style>
</head>
<body data-page="signup">
  <section class="auth-box">
    <h1 class="auth-title">Sign Up</h1>
    <p class="auth-subtitle">Create your account in seconds</p>

    <form id="signupForm" novalidate>
      <label for="signupName" class="form-label">Name</label>
      <input id="signupName" class="form-control" type="text" placeholder="Your name" required />

      <label for="signupEmail" class="form-label" style="margin-top:12px;">Email</label>
      <input id="signupEmail" class="form-control" type="email" placeholder="you@example.com" required />

      <label for="signupPassword" class="form-label" style="margin-top:12px;">Password</label>
      <input id="signupPassword" class="form-control" type="password" placeholder="At least 6 characters" minlength="6" required />

      <button type="submit" class="auth-btn">Create Account</button>
      <p id="signupMessage" class="auth-msg"></p>
    </form>

    <p class="auth-meta">Already have an account? <a href="login.html">Login</a></p>
  </section>

  <script src="auth.js"></script>
</body>
</html>
